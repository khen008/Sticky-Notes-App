<!DOCTYPE html>
<html>
<head>
    <title>Sticky Notes</title>
</head>
<body>

<h1>Sticky Notes</h1>

<a href="{% url 'note_create' %}">Create New Note</a>

<hr>

{% for note in notes %}

<h3>{{ note.title }}</h3>
<p>{{ note.content }}</p>

<a href="{% url 'note_update' note.pk %}">Edit</a>
<a href="{% url 'note_delete' note.pk %}">Delete</a>

<hr>

{% empty %}

<p>No notes available.</p>

{% endfor %}

</body>
</html>
